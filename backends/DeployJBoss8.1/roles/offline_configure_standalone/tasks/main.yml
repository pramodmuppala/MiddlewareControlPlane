---
- name: Render offline CLI batch to staging
  ansible.builtin.template:
    src: offline-config.cli.j2
    dest: "{{ staging_dir }}/offline-config.cli"
    mode: "0644"

- name: Copy staged standalone.xml to instance validation config
  ansible.builtin.copy:
    src: "{{ staging_dir }}/{{ jboss.standalone.config_file }}"
    dest: "{{ jboss.instance_home }}/configuration/{{ jboss.standalone.validation_config_file }}"
    remote_src: true
    mode: "0644"

- name: Apply offline CLI changes to instance validation config
  ansible.builtin.shell: >
    "{{ jboss.install_home }}/{{ jboss.install_product_version }}/bin/jboss-cli.sh"
    --echo-command
    --commands="embed-server --server-config={{ jboss.standalone.validation_config_file }},run-batch --file={{ staging_dir }}/offline-config.cli,stop-embedded-server"
  args:
    executable: /bin/bash
  environment:
    JAVA_HOME: "{{ jboss.java_home }}"
    JBOSS_HOME: "{{ jboss.install_home }}/{{ jboss.install_product_version }}"
    JAVA_OPTS: "-Djboss.server.base.dir={{ jboss.instance_home }}"
  register: offline_config_result
  changed_when: true

- name: Copy updated validation config back to staging
  ansible.builtin.copy:
    src: "{{ jboss.instance_home }}/configuration/{{ jboss.standalone.validation_config_file }}"
    dest: "{{ staging_dir }}/{{ jboss.standalone.config_file }}"
    remote_src: true
    mode: "0644"
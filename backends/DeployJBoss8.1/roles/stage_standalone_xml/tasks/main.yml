---
- name: Ensure staging directory exists
  ansible.builtin.file:
    path: "{{ staging_dir }}"
    state: directory
    mode: "0755"

- name: Check whether instance standalone.xml exists
  ansible.builtin.stat:
    path: "{{ jboss.instance_home }}/configuration/{{ jboss.standalone.config_file }}"
  register: instance_standalone_xml

- name: Copy current instance standalone.xml to staging when present
  ansible.builtin.copy:
    src: "{{ jboss.instance_home }}/configuration/{{ jboss.standalone.config_file }}"
    dest: "{{ staging_dir }}/{{ jboss.standalone.config_file }}"
    remote_src: true
    mode: "0644"
  when: instance_standalone_xml.stat.exists

- name: Seed staging standalone.xml from product default when instance config is absent
  ansible.builtin.copy:
    src: "{{ jboss.install_home }}/{{ jboss.install_product_version }}/standalone/configuration/{{ jboss.standalone.config_file }}"
    dest: "{{ staging_dir }}/{{ jboss.standalone.config_file }}"
    remote_src: true
    mode: "0644"
  when: not instance_standalone_xml.stat.exists

- name: Ensure required realm property files exist in instance config
  ansible.builtin.copy:
    src: "{{ jboss.install_home }}/{{ jboss.install_product_version }}/standalone/configuration/{{ item }}"
    dest: "{{ jboss.instance_home }}/configuration/{{ item }}"
    remote_src: true
    mode: "0644"
    force: false
  loop:
    - mgmt-users.properties
    - mgmt-groups.properties
    - application-users.properties
    - application-roles.properties
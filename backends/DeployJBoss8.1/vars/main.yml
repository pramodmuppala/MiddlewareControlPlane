---
jboss_defaults:
  install_home: /opt/products/jboss
  instance_home_root: /opt/jboss
  instance_name_prefix: app
  instance_count: 1
  install_product_version: jboss-eap-8.1
  install_owner: parallels
  install_group: parallels
  java_home: "/opt/products/jdk/jdk25"

  base_http_port: 8080
  base_mgmt_port: 9990
  port_step: 10

  standalone:
    config_file: "standalone.xml"
    validation_config_file: "standalone-ansible-validate.xml"
    bind_address: "0.0.0.0"
    management_bind_address: "127.0.0.1"

  java_opts:
    heap_min: "1024m"
    heap_max: "2048m"
    metaspace_max: "512m"
    extra: "-Dfile.encoding=UTF-8"

  management:
    protocol: "remote+http"
    host: "127.0.0.1"
    username: "admin"
    password: "MokshaParimita1"

  logging:
    root_level: "INFO"

  healthcheck:
    enabled: true

# optional compatibility block
jboss:
  instance_count: 1

staging_dir: "/opt/temp/config_build/jboss-eap"

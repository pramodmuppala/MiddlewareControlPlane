---
tomcat_defaults:
  catalina_home: "/opt/products/tomcat/tomcat10"
  catalina_base_root: "/opt/tomcat"
  instance_name_prefix: "app"
  instance_count: 1
  base_port: 8080
  port_step: 10
  java_home: "/opt/products/jdk/jdk25"
  health_url: "http://127.0.0.1:8080/test"
  catalina_opts: "-Xms2g -Xmx2g -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
  file_encoding: "UTF-8"
  destroy_enabled: false

  server:
    shutdown_port: 8005
    shutdown_command: "SHUTDOWN"

  service:
    name: "Catalina"

  connectors:
    - port: 8080
      protocol: "HTTP/1.1"
      connectionTimeout: 20000
      redirectPort: 10003

  engine:
    name: "Catalina"
    defaultHost: "localhost"

  hosts:
    - name: "localhost"
      appBase: "webapps"
      unpackWARs: true
      autoDeploy: false

# This block is what the roles and templates consume after merge.
# Keep it present so old tasks still work until everything is fully migrated.
tomcat:
  catalina_home: "/opt/products/tomcat/tomcat10"
  catalina_base_root: "/opt/tomcat"
  instance_name_prefix: "app"
  instance_count: 1
  base_port: 8080
  port_step: 10
  java_home: "/opt/products/jdk/jdk25"
  health_url: "http://127.0.0.1:8080/test"
  catalina_opts: "-Xms2g -Xmx2g -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
  file_encoding: "UTF-8"
  destroy_enabled: false

  # Backward-compatible single-instance keys
  catalina_base: "/opt/tomcat/app1"

  server:
    shutdown_port: 8005
    shutdown_command: "SHUTDOWN"

  service:
    name: "Catalina"

  connectors:
    - port: 8080
      protocol: "HTTP/1.1"
      connectionTimeout: 20000
      redirectPort: 10003

  engine:
    name: "Catalina"
    defaultHost: "localhost"

  hosts:
    - name: "localhost"
      appBase: "webapps"
      unpackWARs: true
      autoDeploy: false

staging_dir: "/opt/temp/config_build/tomcat"
validates_base: "/opt/temp/tomcat_base_validate"

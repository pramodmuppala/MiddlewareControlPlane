<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Middleware Control Plane Architecture</title>
  <desc id="desc">Shared control plane with API, policy layer, adapters, vendored platform playbooks, and local runtime instances.</desc>
  <style>
    .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
    .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
    .body { font: 15px Arial, sans-serif; fill: #334155; }
    .small { font: 14px Arial, sans-serif; fill: #475569; }
    .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 18; ry: 18; }
    .accent { fill: #eef2ff; stroke: #6366f1; stroke-width: 2; rx: 18; ry: 18; }
    .platform { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 18; ry: 18; }
    .runtime { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 18; ry: 18; }
    .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <text x="40" y="45" class="title">Middleware Control Plane</text>

  <rect x="40" y="80" width="300" height="120" class="accent"/>
  <text x="65" y="115" class="label">Northbound interfaces</text>
  <text x="65" y="145" class="body">• CLI: mcp.py / helper scripts</text>
  <text x="65" y="170" class="body">• REST API: /healthz, /status, /plan, /scale</text>

  <rect x="400" y="55" width="360" height="175" class="box"/>
  <text x="425" y="95" class="label">Shared control-plane core</text>
  <text x="425" y="125" class="body">• config loading and legacy var import</text>
  <text x="425" y="150" class="body">• instance discovery and HTTP probes</text>
  <text x="425" y="175" class="body">• CPU and memory sampling</text>
  <text x="425" y="200" class="body">• decision logging and state tracking</text>

  <rect x="820" y="80" width="300" height="120" class="accent"/>
  <text x="845" y="115" class="label">Policy layer</text>
  <text x="845" y="145" class="body">• threshold-based scaler</text>
  <text x="845" y="170" class="body">• optional OpenAI guarded recommendation</text>

  <path d="M340 140 L400 140" class="arrow"/>
  <path d="M760 140 L820 140" class="arrow"/>
  <path d="M970 200 L970 255" class="arrow"/>

  <rect x="240" y="275" width="700" height="105" class="box"/>
  <text x="265" y="315" class="label">Adapter and execution boundary</text>
  <text x="265" y="345" class="body">Shared engine translates target instance count into adapter-specific Ansible extra vars and executes the vendored playbook.</text>

  <rect x="80" y="410" width="430" height="80" class="platform"/>
  <text x="105" y="445" class="label">platforms/jboss</text>
  <text x="105" y="472" class="small">Deploy.yml, roles/, vars/main.yml, legacy autoscaler helpers</text>

  <rect x="670" y="410" width="430" height="80" class="platform"/>
  <text x="695" y="445" class="label">platforms/tomcat</text>
  <text x="695" y="472" class="small">Deploy.yml, tasks/, roles/, vars/main.yml, legacy autoscaler helpers</text>

  <path d="M440 380 L300 410" class="arrow"/>
  <path d="M740 380 L880 410" class="arrow"/>

  <rect x="970" y="275" width="150" height="105" class="runtime"/>
  <text x="995" y="315" class="label">Runtime host</text>
  <text x="995" y="342" class="small">/opt/jboss/appN</text>
  <text x="995" y="365" class="small">/opt/tomcat/appN</text>
</svg>

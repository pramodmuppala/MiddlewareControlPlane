<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ── JBoss EAP Cluster container ── -->
<rect x="30" y="30" width="290" height="200" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="175" y="56" text-anchor="middle">JBoss EAP 8.1 cluster</text>

<!-- EAP instances -->
<rect x="52" y="72" width="120" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="112" y="94" text-anchor="middle">EAP instance 1</text>
<text font-size="12" fill="#0F6E56" x="112" y="110" text-anchor="middle">App server</text>

<rect x="186" y="72" width="120" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="246" y="94" text-anchor="middle">EAP instance N</text>
<text font-size="12" fill="#0F6E56" x="246" y="110" text-anchor="middle">App server</text>

<text font-size="12" fill="#444" x="175" y="135" text-anchor="middle">· · ·</text>

<!-- Metrics collector -->
<rect x="52" y="148" width="254" height="62" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="179" y="172" text-anchor="middle">Metrics collector</text>
<text font-size="12" fill="#5F5E5A" x="179" y="190" text-anchor="middle">CPU · heap · threads · req/s · GC</text>

<!-- Arrows EAP → Metrics -->
<line x1="112" y1="122" x2="130" y2="148" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="246" y1="122" x2="226" y2="148" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ── Autoscaler Engine ── -->
<rect x="200" y="280" width="280" height="150" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="340" y="306" text-anchor="middle">Autoscaler engine</text>

<rect x="220" y="322" width="110" height="90" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="275" y="347" text-anchor="middle">Policy engine</text>
<text font-size="12" fill="#5F5E5A" x="275" y="365" text-anchor="middle">Thresholds</text>
<text font-size="12" fill="#5F5E5A" x="275" y="381" text-anchor="middle">Cooldown rules</text>
<text font-size="12" fill="#5F5E5A" x="275" y="397" text-anchor="middle">Scale bounds</text>

<rect x="348" y="322" width="116" height="90" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="406" y="347" text-anchor="middle">AI decision</text>
<text font-size="12" fill="#5F5E5A" x="406" y="365" text-anchor="middle">Prompt builder</text>
<text font-size="12" fill="#5F5E5A" x="406" y="381" text-anchor="middle">Response parser</text>
<text font-size="12" fill="#5F5E5A" x="406" y="397" text-anchor="middle">Action resolver</text>

<!-- Arrow: Metrics → Autoscaler -->
<path d="M179 210 L179 265 L310 265 L310 280" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="12" fill="#555" x="245" y="258" text-anchor="middle">metrics snapshot</text>

<!-- ── OpenAI API ── -->
<rect x="460" y="30" width="190" height="120" rx="14" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#711B13" x="555" y="58" text-anchor="middle">OpenAI API</text>
<text font-size="12" fill="#993C1D" x="555" y="78" text-anchor="middle">GPT-4 / GPT-4o</text>
<text font-size="12" fill="#993C1D" x="555" y="96" text-anchor="middle">Scale reasoning</text>
<text font-size="12" fill="#993C1D" x="555" y="114" text-anchor="middle">Natural-language output</text>

<!-- Arrow: Autoscaler → OpenAI (prompt) -->
<path d="M464 340 L430 340 L430 90 L460 90" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="12" fill="#555" x="442" y="220" text-anchor="middle" transform="rotate(-90 442 220)">prompt + metrics</text>

<!-- Arrow: OpenAI → Autoscaler (response) -->
<path d="M460 118 L438 118 L438 375 L464 375" fill="none" stroke="#D85A30" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="12" fill="#D85A30" x="454" y="260" text-anchor="middle" transform="rotate(-90 454 260)">scale recommendation</text>

<!-- ── Infrastructure container ── -->
<rect x="30" y="480" width="620" height="120" rx="14" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#27500A" x="340" y="506" text-anchor="middle">Infrastructure / orchestration</text>

<rect x="52" y="520" width="136" height="62" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="120" y="545" text-anchor="middle">OpenShift / K8s</text>
<text font-size="12" fill="#0F6E56" x="120" y="561" text-anchor="middle">Scale replicas</text>

<rect x="206" y="520" width="136" height="62" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="274" y="545" text-anchor="middle">VM autoscaling</text>
<text font-size="12" fill="#0F6E56" x="274" y="561" text-anchor="middle">Add / remove hosts</text>

<rect x="360" y="520" width="136" height="62" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="428" y="545" text-anchor="middle">Audit log</text>
<text font-size="12" fill="#5F5E5A" x="428" y="561" text-anchor="middle">Scale history</text>

<rect x="514" y="520" width="116" height="62" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="572" y="545" text-anchor="middle">Alerting</text>
<text font-size="12" fill="#5F5E5A" x="572" y="561" text-anchor="middle">Slack / PagerDuty</text>

<!-- Arrow: Autoscaler → Infrastructure -->
<path d="M340 430 L340 480" fill="none" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text font-size="12" fill="#555" x="355" y="462" text-anchor="start">scale action</text>

<!-- Feedback arrow -->
<path d="M120 520 L120 460 L60 460 L60 230" fill="none" stroke="#888" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text font-size="12" fill="#555" x="36" y="360" text-anchor="middle" transform="rotate(-90 36 360)">new instances join cluster</text>
</svg>

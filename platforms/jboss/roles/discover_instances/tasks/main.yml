---
        - name: Discover existing JBoss instance directories
          ansible.builtin.shell: >
            set -o pipefail &&
            if [ -d "{{ jboss.instance_root }}" ]; then
              find "{{ jboss.instance_root }}" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' |
              grep -E '^{{ jboss.instance_name_prefix }}[0-9]+$' |
              sort -V
            fi
          args:
            executable: /bin/bash
          register: discovered_instances
          changed_when: false
          failed_when: false

        - name: Normalize discovered instance list
          ansible.builtin.set_fact:
            existing_instance_names: "{{ discovered_instances.stdout_lines | default([]) }}"
